<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tlbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2a"/>
      <stop offset="50%" stop-color="#4a1a5a"/>
      <stop offset="100%" stop-color="#7c1a8a"/>
    </linearGradient>
    <linearGradient id="tlaccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#feca57"/>
    </linearGradient>
    <radialGradient id="tlglow" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#feca57" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#feca57" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="728" height="90" fill="url(#tlbg)"/>
  <circle cx="100" cy="45" r="60" fill="url(#tlglow)"/>
  <circle cx="600" cy="45" r="50" fill="url(#tlglow)" opacity="0.5"/>

  <!-- Lens icon -->
  <g transform="translate(40, 25)">
    <rect width="40" height="40" rx="10" fill="url(#tlaccent)"/>
    <circle cx="20" cy="20" r="10" fill="none" stroke="#fff" stroke-width="2.5"/>
    <line x1="27" y1="27" x2="32" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="100" y="38" fill="#fff" font-family="Inter,sans-serif" font-weight="800" font-size="22">ThinkingLenz</text>
  <text x="100" y="58" fill="#ff6b9d" font-family="Inter,sans-serif" font-weight="600" font-size="11">Smart Insights for Your Mind</text>

  <!-- CTA Button -->
  <rect x="560" y="28" width="140" height="36" rx="18" fill="url(#tlaccent)"/>
  <text x="630" y="51" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="13">Discover →</text>
</svg>
