<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="lmbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a23"/>
      <stop offset="50%" stop-color="#1a1a4a"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="lmaccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="lmglow" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="728" height="90" fill="url(#lmbg)"/>
  <circle cx="100" cy="45" r="60" fill="url(#lmglow)"/>
  <circle cx="600" cy="45" r="50" fill="url(#lmglow)" opacity="0.5"/>

  <!-- AI icon -->
  <g transform="translate(40, 25)">
    <rect width="40" height="40" rx="10" fill="url(#lmaccent)"/>
    <text x="20" y="28" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="900" font-size="18">AI</text>
  </g>

  <!-- Title -->
  <text x="100" y="38" fill="#fff" font-family="Inter,sans-serif" font-weight="800" font-size="22">ListMyAI</text>
  <text x="100" y="58" fill="#00d4ff" font-family="Inter,sans-serif" font-weight="600" font-size="11">Discover the Best AI Tools</text>

  <!-- CTA Button -->
  <rect x="560" y="28" width="140" height="36" rx="18" fill="url(#lmaccent)"/>
  <text x="630" y="51" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="13">Explore Now →</text>
</svg>
