<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tl2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2a"/>
      <stop offset="50%" stop-color="#4a1a5a"/>
      <stop offset="100%" stop-color="#7c1a8a"/>
    </linearGradient>
    <linearGradient id="tl2accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#feca57"/>
    </linearGradient>
    <radialGradient id="tl2glow" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#feca57" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#feca57" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="250" fill="url(#tl2bg)"/>
  <circle cx="240" cy="50" r="50" fill="url(#tl2glow)"/>
  <circle cx="40" cy="210" r="60" fill="url(#tl2glow)" opacity="0.5"/>

  <!-- Lens icon -->
  <g transform="translate(118, 35)">
    <rect width="64" height="64" rx="14" fill="url(#tl2accent)"/>
    <circle cx="32" cy="32" r="16" fill="none" stroke="#fff" stroke-width="3.5"/>
    <line x1="44" y1="44" x2="52" y2="52" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="150" y="135" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="800" font-size="28">ThinkingLenz</text>
  <text x="150" y="158" text-anchor="middle" fill="#ff6b9d" font-family="Inter,sans-serif" font-weight="600" font-size="13">.com</text>
  <text x="150" y="185" text-anchor="middle" fill="#f0e0ff" font-family="Inter,sans-serif" font-size="12">Smart Insights</text>
  <text x="150" y="202" text-anchor="middle" fill="#f0e0ff" font-family="Inter,sans-serif" font-size="12">for Your Mind</text>

  <!-- CTA -->
  <rect x="100" y="215" width="100" height="32" rx="16" fill="url(#tl2accent)"/>
  <text x="150" y="236" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="13">Discover →</text>
</svg>
