name: Evergreen Blog Agent

on:
  # ⏸ PAUSED DURING ADSENSE REVIEW
  # AdSense flagged "low value content" — too much AI-generated content.
  # Cron schedule disabled until AdSense approval.
  # Manual runs still work via "Run workflow" button in GitHub Actions UI.
  # Re-enable by uncommenting the schedule block below:
  #
  # schedule:
  #   - cron: "0 */12 * * *"

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      model:
        description: "Claude model (optional override)"
        required: false
        default: "claude-haiku-4-5"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet python-dotenv requests

      - name: Run evergreen agent
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UNSPLASH_ACCESS_KEY:        ${{ secrets.UNSPLASH_ACCESS_KEY }}
          AMAZON_ASSOCIATE_ID:        edudhruv-20
          # Default Haiku 4.5 — verified working on this account
          CLAUDE_MODEL:               ${{ inputs.model || 'claude-haiku-4-5' }}
          # On-demand Vercel cache revalidation after publishing a new post
          SITE_URL:                   ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET:          ${{ secrets.REVALIDATE_SECRET }}
        run: python automation/evergreen_agent.py
